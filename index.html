    <script type="application/ld+json">

      "@context": "https://schema.org",

        {
          "@type": "Organization",
          "@id": "https://www.neutron-robotics.fr/#organization",

          "foundingLocation": { "@type": "Place", "address": { "@type": "PostalAddress", "addressCountry": "FR" } },
          "founder": [
            { "@type": "Person", "name": "Romain Gasquet", "jobTitle": "Président" },
            { "@type": "Person", "name": "Florian Even", "jobTitle": "Directeur général" }
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.neutron-robotics.fr/#website",
          "url": "https://www.neutron-robotics.fr/",
          "name": "Neutron Robotics",
          "publisher": { "@id": "https://www.neutron-robotics.fr/#organization" },
          "inLanguage": ["fr", "en"]
        },
        {
          "@type": "FAQPage",
          "@id": "https://www.neutron-robotics.fr/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Concrètement, comment fonctionne le drone ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Le drone embarque un calculateur d'IA (modules ouverts type NVIDIA Jetson ou Hailo) et un SDK ouvert. Vous chargez un programme depuis le catalogue — ou le vôtre — en quelques clics, sans reflasher le matériel. Le changement de mission prend cinq minutes."
              }
            },
            {
              "@type": "Question",
              "name": "Ça marche sans connexion internet ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Oui. Les modèles d'IA tournent entièrement à bord, sans dépendre d'un réseau ou d'un cloud. Les données restent sur l'appareil : idéal pour les zones isolées ou les usages sensibles."
              }
            },
            {
              "@type": "Question",
              "name": "Pourquoi pas un drone du commerce classique ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Les drones professionnels actuels sont figés : changer leur mission prend six mois et jusqu'à 80 000 €, et la majorité viennent de Chine. Neutron Robotics est ouvert, réparable et reprogrammable en quelques minutes, avec un assemblage souverain en France."
              }
            },
            {
              "@type": "Question",
              "name": "Par où commencer ?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Rejoignez la liste d'attente sur le site. Les premiers kits sont livrés aux laboratoires partenaires dès le premier trimestre 2027."
              }
            }
          ]
        }
      ]
    }
